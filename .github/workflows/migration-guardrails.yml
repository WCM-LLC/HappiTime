name: Migration Guardrails

# Layer 2 (immutability) + Layer 3 (drift detection) from docs/database-change-policy.md.
on:
  pull_request:
    paths: ['supabase/migrations/**', 'scripts/reconcile/**', '.github/workflows/migration-guardrails.yml']
  schedule:
    - cron: '17 7 * * *'   # nightly drift sweep (07:17 UTC)
  workflow_dispatch:

jobs:
  # ── Layer 2: applied migrations are immutable; PRs may only ADD new files ──
  migration-immutability:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      BASE_REF: ${{ github.base_ref }}   # via env (never interpolate refs into run:)
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Block edits/deletes/renames of existing migrations
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" --depth=1
          # Any migration file Modified, Deleted, or Renamed relative to base is forbidden.
          violations="$(git diff --diff-filter=MDR --name-status "origin/$BASE_REF"...HEAD -- supabase/migrations/ || true)"
          if [ -n "$violations" ]; then
            echo "::error::Migrations are append-only. Files already applied to prod must NOT be edited, deleted, or renamed — add a NEW forward migration instead:"
            echo "$violations"
            exit 1
          fi
          echo "OK — this PR only ADDS migration files."

  # ── Layer 3: does a clean replay reproduce prod's schema? ──
  # INFORMATIONAL until the schema-drift reconciliation completes (then drop
  # continue-on-error and mark this a required check). Needs a READ-ONLY prod
  # connection string in the SUPABASE_DB_URL_RO secret (see database-change-policy.md).
  schema-parity:
    # Nightly + on-demand only — NOT on PRs. A PR that adds a new migration legitimately makes
    # the replay differ from CURRENT prod (the migration deploys on merge), so PR-time parity
    # is meaningless. The real drift gate is the nightly run against master (== prod after
    # deploys): a failure means out-of-band prod DDL that must be back-filled. Reconciliation
    # reached parity 2026-06-01, so this is now a hard failure (no continue-on-error).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      PROD_URL: ${{ secrets.SUPABASE_DB_URL_RO }}   # via env (never interpolate secrets into run:)
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: 2.95.6 }
      - name: Start Supabase (db only)
        run: supabase start -x gotrue,realtime,storage-api,imgproxy,kong,mailpit,postgrest,postgres-meta,studio,edge-runtime,logflare,vector,supavisor
      - name: Install PostgreSQL 17 client (read-only pg_dump, no SET ROLE)
        run: |
          set -euo pipefail
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          /usr/lib/postgresql/17/bin/pg_dump --version
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
      - name: Verify migration replay == prod schema
        run: |
          set -euo pipefail
          if [ -z "${PROD_URL:-}" ]; then
            echo "SUPABASE_DB_URL_RO not set — skipping parity check (configure it to enable drift detection)."
            exit 0
          fi
          bash scripts/reconcile/verify-parity.sh --db-url "$PROD_URL"
