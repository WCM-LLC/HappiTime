name: Supabase DB Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "supabase/migrations/**"

jobs:
  db-deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate required secrets
        run: |
          missing=0

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Error: SUPABASE_ACCESS_TOKEN is not set. Configure this repository secret before running the workflow."
            missing=1
          fi

          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Error: SUPABASE_PROJECT_REF is not set. Configure this repository secret before running the workflow."
            missing=1
          fi

          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Error: SUPABASE_DB_PASSWORD is not set. Configure this repository secret before running the workflow."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "One or more required Supabase secrets are missing. Failing early."
            exit 1
          fi
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Apply migrations
        run: supabase db push

