name: Supabase DB Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - "supabase/migrations/**"

jobs:
  db-deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v2
        with:
          version: 2.101.0
      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Error: SUPABASE_DB_URL is not set. Configure this repository secret before running the workflow."
            exit 1
          fi
      - name: Apply migrations
        run: supabase db push --include-all --db-url "$SUPABASE_DB_URL"
