name: Auth Health

# Daily tripwire for the email magic-link auth path — added after the 2026-06
# outage (every POST /otp -> 500) ran ~30 days undetected. A failed run emails
# the repo watchers via GitHub notifications. See scripts/check-auth-health.mjs.
on:
  schedule:
    - cron: '37 13 * * *'   # daily sweep (13:37 UTC)
  workflow_dispatch:

jobs:
  auth-health:
    runs-on: ubuntu-latest
    env:
      # via env (never interpolate secrets into run:)
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validate required secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN / SUPABASE_PROJECT_REF repository secrets are not configured (see DEPLOYMENT.md)."
            exit 1
          fi
      - name: Check auth health (24h 5xx + 7d email-signup flatline)
        run: node scripts/check-auth-health.mjs
